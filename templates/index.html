<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="MedRoute - Find medicines near you with verified pharmacy stock and real-time navigation.">
    <title>MedRoute — Medicine Search & Navigation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">☰</button>
    <!-- Panel Overlay Backdrop -->
    <div class="panel-overlay" id="panel-overlay"></div>

    <div class="app-container">
        <aside class="panel" id="panel">
            <!-- Panel Close Button (Mobile) -->
            <button class="panel-close-btn" id="panel-close-btn" aria-label="Close menu">✕</button>
            <header class="panel-header">
                <div class="logo">
                    <span class="logo-icon">💊</span>
                    <h1>MedRoute</h1>
                </div>
                <p class="tagline">Find medicines. Get directions.</p>
            </header>

            <div class="search-section">
                <div class="category-toggle">
                    <button class="category-btn active" data-category="human" id="btn-human">
                        <span class="category-icon">🧑</span>
                        <span>Human</span>
                    </button>
                    <button class="category-btn" data-category="pet" id="btn-pet">
                        <span class="category-icon">🐾</span>
                        <span>Pets</span>
                    </button>
                </div>
                <div class="input-group">
                    <label for="location-input">Your Location</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <input type="text" id="location-input" placeholder="Enter your location..." autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="medicine-input">Medicine Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        </svg>
                        <input type="text" id="medicine-input" placeholder="e.g. Paracetamol, Dolo 650..."
                            autocomplete="off">
                    </div>
                </div>

                <button id="search-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Search Medicine
                </button>
            </div>

            <div id="medicine-list-section" class="medicine-list-section">
                <div class="medicine-list-header">
                    <h2>Browse Medicines</h2>
                    <span class="medicine-count-badge" id="medicine-count-badge"></span>
                </div>
                <div id="medicine-tags" class="medicine-tags"></div>
            </div>

            <div id="results-section" class="results-section hidden">
                <div class="results-header">
                    <h2 id="results-title">Results</h2>
                    <span id="results-badge" class="badge"></span>
                </div>
                <ul id="results-list" class="results-list"></ul>
            </div>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">🗺️</div>
                <p>Search for a medicine to find nearby pharmacies</p>
            </div>

            <div id="loading-state" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Searching pharmacies...</p>
            </div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
    <script src="/static/js/map.js"></script>
    <script>
        // Mobile panel toggle logic
        (function () {
            var menuBtn = document.getElementById('mobile-menu-btn');
            var closeBtn = document.getElementById('panel-close-btn');
            var panel = document.getElementById('panel');
            var overlay = document.getElementById('panel-overlay');

            function openPanel() {
                panel.classList.add('open');
                overlay.classList.add('active');
                menuBtn.setAttribute('aria-label', 'Close menu');
                document.body.style.overflow = 'hidden';
            }

            function closePanel() {
                panel.classList.remove('open');
                overlay.classList.remove('active');
                menuBtn.setAttribute('aria-label', 'Open menu');
                document.body.style.overflow = '';
            }

            menuBtn.addEventListener('click', function () {
                if (panel.classList.contains('open')) {
                    closePanel();
                } else {
                    openPanel();
                }
            });

            closeBtn.addEventListener('click', closePanel);
            overlay.addEventListener('click', closePanel);

            // Auto-close panel when a search result card is clicked (mobile)
            document.addEventListener('click', function (e) {
                var card = e.target.closest('.result-card');
                if (card && window.innerWidth <= 768) {
                    setTimeout(closePanel, 300);
                }
            });

            // Close panel on Escape key
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && panel.classList.contains('open')) {
                    closePanel();
                }
            });

            // Reset state on window resize (if moving from mobile to desktop)
            window.addEventListener('resize', function () {
                if (window.innerWidth > 768) {
                    panel.classList.remove('open');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        })();
    </script>
</body>

</html>
